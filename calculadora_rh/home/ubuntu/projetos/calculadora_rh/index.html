<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Custos de RH</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Custos de RH</h1>
        <div class="input-group">
            <label for="salarioBase">Salário Base (R$):</label>
            <input type="number" id="salarioBase" value="2000">
        </div>
        <div class="input-group">
            <label for="beneficios">Benefícios (R$):</label>
            <input type="number" id="beneficios" value="500">
        </div>
        <div class="input-group">
            <label for="encargos">Encargos Sociais (%):</label>
            <input type="number" id="encargos" value="30">
        </div>
        <button onclick="calcularCusto()">Calcular Custo Total</button>
        <div class="result">
            <h2>Custo Total Mensal: <span id="custoTotal">R$ 0.00</span></h2>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
